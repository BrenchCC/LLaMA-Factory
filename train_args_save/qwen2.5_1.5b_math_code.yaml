### model
model_name_or_path: /mnt/bn/brench-training-test/base_models/Qwen2.5-1.5B-Instruct

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: indentity
template: qwen
cutoff_len: 32768
max_samples: 5000000
overwrite_cache: true
preprocessing_num_workers: 16


### output
output_dir: /mnt/bn/brench-training-test/qwen2_models_saves/qwen2.5-1.5b-math-code/full/sft/v1
logging_steps: 1
save_steps: 1000
plot_loss: true
